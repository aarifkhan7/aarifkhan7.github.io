<header class="site-header">
  <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
  <nav class="site-nav">
    {% for item in site.nav %}
      {% if item.path == "/" %}
        {% assign is_active = page.url == item.path %}
      {% else %}
        {% assign is_active = page.url contains item.path %}
      {% endif %}
      <a href="{{ item.path | relative_url }}"{% if is_active %} class="active"{% endif %}>{{ item.title }}</a>
    {% endfor %}
  </nav>
</header>
