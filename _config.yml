title: Aarif Khan
description: Personal site, blog, and projects.
url: "https://aarifkhan.com"

author:
  name: Aarif Khan
  email: aarifkhannitrr@gmail.com
  linkedin: https://www.linkedin.com/in/aarif-khan-b1aa97171/

# Nav links shown in the header, in order.
nav:
  - title: Home
    path: /
  - title: Projects
    path: /projects/
  - title: Blog
    path: /blog/
  - title: Contact
    path: /contact/

collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: page
  - scope:
      path: ""
    values:
      layout: page

markdown: kramdown
permalink: /:title/

plugins:
  - jekyll-feed

exclude:
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - vendor/
